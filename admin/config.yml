backend:
  name: github
  branch: main
  repo: akari1-source/akari.designs

media_folder: "images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Products"
    folder: "products"
    create: true
    slug: "{{id}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - { label: "ID", name: "id", widget: "string" }
      - { label: "Title", name: "title", widget: "string" }
      - label: "Category"
        name: "category"
        widget: "select"
        default: "art"
        options:
          - { label: "Flower Preservation", value: "flower-preservation" }
          - { label: "Art", value: "art" }
          - { label: "Personalized Gifts", value: "personalized-gifts" }
          - { label: "Home Décor", value: "home-decor" }
          - { label: "Creative Services", value: "creative-services" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Price", name: "price", widget: "string", required: false }
      - { label: "Price Type", name: "priceType", widget: "select", options: ["starting", "hourly", "quote"], default: "starting", required: false }
      - { label: "CTA Text", name: "ctaText", widget: "string", default: "Customize Yours", required: false }
      - { label: "Icon", name: "icon", widget: "string", default: "📦", required: false }
      - { label: "Featured on Homepage", name: "featured", widget: "boolean", default: false, required: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }
